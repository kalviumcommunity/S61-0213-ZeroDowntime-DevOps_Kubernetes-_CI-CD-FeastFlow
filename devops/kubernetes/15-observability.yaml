# Prometheus and Grafana Kubernetes manifests for FeastFlow
---
# Prometheus
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
---
apiVersion: helm.sh/v3
kind: HelmRelease
metadata:
  name: prometheus
  namespace: monitoring
spec:
  chart:
    repository: https://prometheus-community.github.io/helm-charts
    name: prometheus
    version: 25.7.3
  values:
    server:
      service:
        type: ClusterIP
      retention: 7d
      scrape_interval: 15s
---
# Grafana
apiVersion: helm.sh/v3
kind: HelmRelease
metadata:
  name: grafana
  namespace: monitoring
spec:
  chart:
    repository: https://grafana.github.io/helm-charts
    name: grafana
    version: 8.0.2
  values:
    adminPassword: feastflowadmin
    service:
      type: ClusterIP
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: Prometheus
            type: prometheus
            url: http://prometheus-server.monitoring.svc.cluster.local
            access: proxy
            isDefault: true
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: "FeastFlow"
            orgId: 1
            folder: "FeastFlow"
            type: file
            options:
              path: /var/lib/grafana/dashboards/FeastFlow
    dashboards:
      FeastFlow:
        feastflow-overview:
          json: |-
            {
              "title": "FeastFlow Overview",
              "panels": [
                {
                  "type": "graph",
                  "title": "Pod CPU Usage",
                  "targets": [
                    {
                      "expr": "sum(rate(container_cpu_usage_seconds_total{pod=~\"feastflow.*\"}[5m])) by (pod)",
                      "format": "time_series"
                    }
                  ]
                },
                {
                  "type": "graph",
                  "title": "Pod Memory Usage",
                  "targets": [
                    {
                      "expr": "sum(container_memory_usage_bytes{pod=~\"feastflow.*\"}) by (pod)",
                      "format": "time_series"
                    }
                  ]
                }
              ]
            }
