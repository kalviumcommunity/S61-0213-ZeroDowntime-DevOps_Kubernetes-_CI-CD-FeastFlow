# Fluent Bit - Lightweight Log Collector and Forwarder
# Runs on every node as a DaemonSet to collect logs from all pods
# Forwards logs to Loki with proper labels for querying and filtering

---
# ServiceAccount for Fluent Bit
# Required for reading pod logs and metadata from Kubernetes API
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fluent-bit
  namespace: feastflow
  labels:
    app: fluent-bit
    component: logging

---
# ClusterRole for Fluent Bit
# Grants permissions to read pods, namespaces, and pod logs
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fluent-bit
  labels:
    app: fluent-bit
    component: logging
rules:
- apiGroups: [""]
  resources:
    - namespaces
    - pods
    - pods/log
  verbs: ["get", "list", "watch"]

---
# ClusterRoleBinding for Fluent Bit
# Binds the ClusterRole to the ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fluent-bit
  labels:
    app: fluent-bit
    component: logging
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fluent-bit
subjects:
- kind: ServiceAccount
  name: fluent-bit
  namespace: feastflow

---
# ConfigMap for Fluent Bit configuration
# Defines how logs are collected, parsed, enriched, and forwarded
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: feastflow
  labels:
    app: fluent-bit
    component: logging
data:
  fluent-bit.conf: |
    [SERVICE]
        Daemon Off
        Flush 1
        Log_Level info
        Parsers_File parsers.conf
        Parsers_File custom_parsers.conf
        HTTP_Server On
        HTTP_Listen 0.0.0.0
        HTTP_Port 2020
        Health_Check On

    [INPUT]
        Name tail
        Path /var/log/containers/*.log
        multiline.parser docker, cri
        Tag kube.*
        Mem_Buf_Limit 5MB
        Skip_Long_Lines On
        Refresh_Interval 10

    [FILTER]
        Name kubernetes
        Match kube.*
        Kube_URL https://kubernetes.default.svc:443
        Kube_CA_File /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix kube.var.log.containers.
        Merge_Log On
        Keep_Log Off
        K8S-Logging.Parser On
        K8S-Logging.Exclude On
        Labels On
        Annotations Off

    [FILTER]
        Name modify
        Match kube.*
        Add cluster feastflow-cluster
        Add environment production

    [FILTER]
        Name nest
        Match kube.*
        Operation lift
        Nested_under kubernetes
        Add_prefix k8s_

    [OUTPUT]
        Name loki
        Match kube.*
        Host loki.feastflow.svc.cluster.local
        Port 3100
        Labels job=fluentbit, cluster=feastflow-cluster
        Label_keys $k8s_namespace_name,$k8s_pod_name,$k8s_container_name,$k8s_labels_app
        Auto_Kubernetes_Labels On
        Line_format json
        Remove_keys kubernetes,stream

  parsers.conf: |
    [PARSER]
        Name docker
        Format json
        Time_Key time
        Time_Format %Y-%m-%dT%H:%M:%S.%L
        Time_Keep On

    [PARSER]
        Name syslog
        Format regex
        Regex ^\<(?<pri>[0-9]+)\>(?<time>[^ ]* {1,2}[^ ]* [^ ]*) (?<host>[^ ]*) (?<ident>[a-zA-Z0-9_\/\.\-]*)(?:\[(?<pid>[0-9]+)\])?(?:[^\:]*\:)? *(?<message>.*)$
        Time_Key time
        Time_Format %b %d %H:%M:%S

  custom_parsers.conf: |
    [PARSER]
        Name json
        Format json
        Time_Key time
        Time_Format %Y-%m-%dT%H:%M:%S.%L
        Time_Keep On

    [PARSER]
        Name nginx
        Format regex
        Regex ^(?<remote>[^ ]*) (?<host>[^ ]*) (?<user>[^ ]*) \[(?<time>[^\]]*)\] "(?<method>\S+)(?: +(?<path>[^\"]*?)(?: +\S*)?)?" (?<code>[^ ]*) (?<size>[^ ]*)(?: "(?<referer>[^\"]*)" "(?<agent>[^\"]*)")
        Time_Key time
        Time_Format %d/%b/%Y:%H:%M:%S %z

---
# DaemonSet for Fluent Bit
# Ensures Fluent Bit runs on every node to collect logs
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: feastflow
  labels:
    app: fluent-bit
    component: logging
    tier: infrastructure
spec:
  selector:
    matchLabels:
      app: fluent-bit
  template:
    metadata:
      labels:
        app: fluent-bit
        component: logging
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "2020"
        prometheus.io/path: "/api/v1/metrics/prometheus"
    spec:
      serviceAccountName: fluent-bit
      tolerations:
      # Allow running on master/control-plane nodes
      - key: node-role.kubernetes.io/master
        operator: Exists
        effect: NoSchedule
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
      containers:
      - name: fluent-bit
        image: fluent/fluent-bit:2.2.0
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 2020
          protocol: TCP
        volumeMounts:
        - name: config
          mountPath: /fluent-bit/etc/
        - name: varlog
          mountPath: /var/log
          readOnly: true
        - name: varlibdockercontainers
          mountPath: /var/lib/docker/containers
          readOnly: true
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
      terminationGracePeriodSeconds: 30
      volumes:
      - name: config
        configMap:
          name: fluent-bit-config
      - name: varlog
        hostPath:
          path: /var/log
      - name: varlibdockercontainers
        hostPath:
          path: /var/lib/docker/containers

---
# Service for Fluent Bit metrics
# Exposes Fluent Bit metrics for monitoring
apiVersion: v1
kind: Service
metadata:
  name: fluent-bit
  namespace: feastflow
  labels:
    app: fluent-bit
    component: logging
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - name: http
    port: 2020
    targetPort: http
    protocol: TCP
  selector:
    app: fluent-bit
