name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Run tests
        run: npm test

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend/app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Run tests
        run: npm run lint

  docker-image-build:
    name: Docker Image Build
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute image tags
        id: tags
        run: |
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          echo "backend_commit=feastflow-backend:commit-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "backend_build=feastflow-backend:build-${{ github.run_number }}" >> $GITHUB_OUTPUT
          echo "frontend_commit=feastflow-frontend:commit-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "frontend_build=feastflow-frontend:build-${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: |
            ${{ steps.tags.outputs.backend_commit }}
            ${{ steps.tags.outputs.backend_build }}

      - name: Build frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/app
          file: ./frontend/app/Dockerfile
          push: false
          tags: |
            ${{ steps.tags.outputs.frontend_commit }}
            ${{ steps.tags.outputs.frontend_build }}
